<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevQuiz — Test your code. Level up your mind.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #0a0a12;
      --bg-mid: #12121f;
      --electric-blue: #00d4ff;
      --electric-purple: #a855f7;
      --electric-pink: #ec4899;
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text-primary: #f0f0f5;
      --text-muted: #9494a8;
      --correct: #22c55e;
      --wrong: #ef4444;
      --radius: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100dvh;
      overflow-x: hidden;
      line-height: 1.5;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0, 212, 255, 0.15), transparent),
        radial-gradient(ellipse 70% 50% at 80% 80%, rgba(168, 85, 247, 0.18), transparent),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(236, 72, 153, 0.06), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 1.25rem 1rem calc(1.25rem + var(--safe-bottom));
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .screen {
      display: none;
      flex-direction: column;
      flex: 1;
      animation: fadeIn 0.4s ease;
    }

    .screen.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideOut {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(-30px); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .question-card.animating-out { animation: slideOut 0.25s ease forwards; }
    .question-card.animating-in { animation: slideIn 0.35s ease forwards; }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
    }

    /* ── Home ── */
    .home {
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 2rem;
      padding: 2rem 0;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--electric-blue), var(--electric-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
    }

    .app-title {
      font-size: clamp(2.5rem, 10vw, 3.25rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--electric-blue), var(--electric-purple), var(--electric-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .tagline {
      font-size: 1.05rem;
      color: var(--text-muted);
      max-width: 280px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      min-height: 52px;
      padding: 0.875rem 1.75rem;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      width: 100%;
      max-width: 100%;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--electric-blue), var(--electric-purple));
      color: #fff;
      box-shadow: 0 4px 24px rgba(0, 212, 255, 0.25);
    }

    .btn-primary:hover { box-shadow: 0 6px 32px rgba(0, 212, 255, 0.4); }

    .btn-secondary {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
    }

    .btn-secondary:hover { border-color: rgba(0, 212, 255, 0.4); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--electric-purple);
      color: var(--electric-purple);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Setup ── */
    .setup { gap: 1.25rem; }

    .screen-header {
      text-align: center;
      padding-top: 0.5rem;
    }

    .screen-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .screen-header p { color: var(--text-muted); font-size: 0.9rem; }

    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.625rem;
    }

    .option-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.625rem;
    }

    .option-btn {
      min-height: 56px;
      padding: 0.75rem 0.625rem;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      word-break: break-word;
    }

    .option-btn:hover { border-color: rgba(0, 212, 255, 0.35); }

    .option-btn.selected {
      border-color: var(--electric-blue);
      background: rgba(0, 212, 255, 0.12);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
    }

    .setup-actions { margin-top: auto; padding-top: 1rem; display: flex; flex-direction: column; gap: 0.625rem; }

    /* ── Quiz ── */
    .quiz { gap: 1rem; }

    .quiz-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .quiz-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .timer-ring {
      position: relative;
      width: 52px;
      height: 52px;
      flex-shrink: 0;
    }

    .timer-ring svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .timer-ring circle {
      fill: none;
      stroke-width: 3;
    }

    .timer-bg { stroke: rgba(255, 255, 255, 0.1); }
    .timer-fill {
      stroke: var(--electric-blue);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.3s linear, stroke 0.3s;
    }

    .timer-fill.warning { stroke: #f59e0b; }
    .timer-fill.danger { stroke: var(--wrong); }

    .timer-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .progress-wrap { width: 100%; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.375rem;
    }

    .progress-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--electric-blue), var(--electric-purple));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .question-card {
      padding: 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 0;
    }

    .question-text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.45;
      word-break: break-word;
    }

    .question-text code {
      font-family: 'Space Grotesk', monospace;
      background: rgba(0, 212, 255, 0.1);
      padding: 0.1em 0.35em;
      border-radius: 4px;
      font-size: 0.95em;
      word-break: break-all;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    .answer-btn {
      min-height: 52px;
      padding: 0.875rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      word-break: break-word;
      line-height: 1.35;
    }

    .answer-btn:hover:not(:disabled) { border-color: rgba(168, 85, 247, 0.4); }

    .answer-btn.correct {
      border-color: var(--correct);
      background: rgba(34, 197, 94, 0.15);
      color: var(--correct);
    }

    .answer-btn.wrong {
      border-color: var(--wrong);
      background: rgba(239, 68, 68, 0.15);
      color: var(--wrong);
    }

    .answer-btn.reveal-correct {
      border-color: var(--correct);
      background: rgba(34, 197, 94, 0.1);
    }

    .answer-btn:disabled { cursor: default; }

    .feedback {
      padding: 0.875rem 1rem;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 500;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    .feedback.correct-fb {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: var(--correct);
    }

    .feedback.wrong-fb {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--wrong);
    }

    .feedback.timeout-fb {
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: #f59e0b;
    }

    /* ── Results ── */
    .results {
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 1.25rem;
    }

    .results-card {
      padding: 2rem 1.5rem;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .score-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(168, 85, 247, 0.15));
      border: 2px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.2);
    }

    .score-number {
      font-size: 2.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--electric-blue), var(--electric-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .score-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }

    .perf-message {
      font-size: 1.15rem;
      font-weight: 600;
    }

    .time-taken {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .results-actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    .toast {
      position: fixed;
      bottom: calc(1.5rem + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(34, 197, 94, 0.95);
      color: #fff;
      padding: 0.75rem 1.25rem;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 500;
      z-index: 100;
      transition: transform 0.3s ease;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 375px) {
      .app { padding: 1rem 0.875rem calc(1rem + var(--safe-bottom)); }
      .option-grid { gap: 0.5rem; }
      .option-btn { font-size: 0.8125rem; min-height: 52px; }
      .question-text { font-size: 1rem; }
      .answer-btn { min-height: 48px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Home -->
    <section id="screen-home" class="screen home active">
      <div class="logo-wrap">
        <div class="logo-icon">&lt;/&gt;</div>
        <h1 class="app-title">DevQuiz</h1>
        <p class="tagline">Test your code. Level up your mind.</p>
      </div>
      <button class="btn btn-primary" id="btn-start" style="max-width: 280px;">Start Quiz</button>
    </section>

    <!-- Setup -->
    <section id="screen-setup" class="screen setup">
      <div class="screen-header">
        <h2>Choose Your Challenge</h2>
        <p>Pick a language and difficulty level</p>
      </div>
      <div>
        <p class="section-label">Language</p>
        <div class="option-grid" id="lang-options">
          <button class="option-btn" data-lang="javascript">JavaScript</button>
          <button class="option-btn" data-lang="python">Python</button>
          <button class="option-btn" data-lang="htmlcss">HTML/CSS</button>
          <button class="option-btn" data-lang="general">General CS</button>
        </div>
      </div>
      <div>
        <p class="section-label">Difficulty</p>
        <div class="option-grid" id="diff-options">
          <button class="option-btn" data-diff="beginner">Beginner</button>
          <button class="option-btn" data-diff="intermediate">Intermediate</button>
          <button class="option-btn" data-diff="advanced">Advanced</button>
        </div>
      </div>
      <div class="setup-actions">
        <button class="btn btn-primary" id="btn-begin" disabled>Begin Quiz</button>
        <button class="btn btn-secondary" id="btn-back-home">Back</button>
      </div>
    </section>

    <!-- Quiz -->
    <section id="screen-quiz" class="screen quiz">
      <div class="quiz-top">
        <span class="quiz-meta" id="quiz-meta"></span>
        <div class="timer-ring">
          <svg viewBox="0 0 52 52">
            <circle class="timer-bg" cx="26" cy="26" r="22"></circle>
            <circle class="timer-fill" id="timer-circle" cx="26" cy="26" r="22"
              stroke-dasharray="138.23" stroke-dashoffset="0"></circle>
          </svg>
          <span class="timer-text" id="timer-text">20</span>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Progress</span>
          <span id="progress-label">1 / 10</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 10%"></div>
        </div>
      </div>
      <div class="question-card glass" id="question-card">
        <p class="question-text" id="question-text"></p>
        <div class="answers" id="answers"></div>
        <div class="feedback" id="feedback" style="display:none;"></div>
      </div>
    </section>

    <!-- Results -->
    <section id="screen-results" class="screen results">
      <div class="results-card glass">
        <div class="score-circle">
          <span class="score-number" id="final-score">0/10</span>
          <span class="score-label">Score</span>
        </div>
        <p class="perf-message" id="perf-message"></p>
        <p class="time-taken" id="time-taken"></p>
      </div>
      <div class="results-actions">
        <button class="btn btn-primary" id="btn-retry">Retry</button>
        <button class="btn btn-outline" id="btn-share">Share Score</button>
        <button class="btn btn-secondary" id="btn-home">Back to Home</button>
      </div>
    </section>
  </div>

  <div class="toast" id="toast">Score copied to clipboard!</div>

  <script>
    // ─── Question Bank (50+ per category) ───
    const QUESTION_BANK = {
      javascript: [
        { difficulty: 'beginner', q: 'What keyword declares a block-scoped variable in JavaScript?', options: ['var', 'let', 'function', 'define'], answer: 1 },
        { difficulty: 'beginner', q: 'Which method adds an element to the end of an array?', options: ['push()', 'pop()', 'shift()', 'unshift()'], answer: 0 },
        { difficulty: 'beginner', q: 'What does <code>typeof null</code> return?', options: ['"null"', '"object"', '"undefined"', '"boolean"'], answer: 1 },
        { difficulty: 'beginner', q: 'How do you write a single-line comment in JavaScript?', options: ['// comment', '# comment', '/* comment', '-- comment'], answer: 0 },
        { difficulty: 'beginner', q: 'Which operator checks both value and type equality?', options: ['==', '===', '=', '!='], answer: 1 },
        { difficulty: 'beginner', q: 'What is the result of <code>2 + "2"</code>?', options: ['4', '"22"', 'NaN', 'Error'], answer: 1 },
        { difficulty: 'beginner', q: 'Which built-in object parses a JSON string?', options: ['JSON.parse()', 'JSON.stringify()', 'Object.parse()', 'String.toJSON()'], answer: 0 },
        { difficulty: 'beginner', q: 'What does <code>console.log()</code> do?', options: ['Shows an alert', 'Outputs to the console', 'Writes to a file', 'Stops execution'], answer: 1 },
        { difficulty: 'beginner', q: 'Which symbol is used for template literals?', options: ['Single quotes', 'Double quotes', 'Backticks', 'Parentheses'], answer: 2 },
        { difficulty: 'beginner', q: 'What is an array index of the first element?', options: ['1', '0', '-1', 'undefined'], answer: 1 },
        { difficulty: 'beginner', q: 'Which method removes the last element from an array?', options: ['push()', 'pop()', 'slice()', 'splice()'], answer: 1 },
        { difficulty: 'beginner', q: 'What keyword creates a constant binding?', options: ['let', 'var', 'const', 'static'], answer: 2 },
        { difficulty: 'beginner', q: 'Which value is falsy in JavaScript?', options: ['[]', '{}', '0', '"0"'], answer: 2 },
        { difficulty: 'beginner', q: 'What does the <code>length</code> property of a string return?', options: ['Byte size', 'Number of characters', 'Word count', 'Line count'], answer: 1 },
        { difficulty: 'beginner', q: 'Which method converts a string to uppercase?', options: ['toUpperCase()', 'upper()', 'capitalize()', 'toCaps()'], answer: 0 },
        { difficulty: 'beginner', q: 'What is the DOM?', options: ['A database', 'Document Object Model', 'Data Object Manager', 'Dynamic Output Module'], answer: 1 },
        { difficulty: 'beginner', q: 'Which event fires when a user clicks an element?', options: ['hover', 'click', 'focus', 'load'], answer: 1 },

        { difficulty: 'intermediate', q: 'Which array method returns a new filtered array?', options: ['forEach()', 'filter()', 'map()', 'reduce()'], answer: 1 },
        { difficulty: 'intermediate', q: 'What does <code>Promise.all()</code> do?', options: ['Runs promises sequentially', 'Waits for all to resolve/reject', 'Cancels all promises', 'Retries failed promises'], answer: 1 },
        { difficulty: 'intermediate', q: 'What is hoisting in JavaScript?', options: ['Moving code to a CDN', 'Moving declarations to top of scope', 'Lifting DOM elements', 'Compressing variables'], answer: 1 },
        { difficulty: 'intermediate', q: 'What does the spread operator <code>...</code> do with arrays?', options: ['Deletes elements', 'Expands into individual elements', 'Sorts elements', 'Clones deeply always'], answer: 1 },
        { difficulty: 'intermediate', q: 'Which method creates a shallow copy of an array?', options: ['copy()', 'slice()', 'splice()', 'concat() only'], answer: 1 },
        { difficulty: 'intermediate', q: 'What is event bubbling?', options: ['Events firing twice', 'Events propagate from child to parent', 'Events are cancelled', 'Events run in parallel'], answer: 1 },
        { difficulty: 'intermediate', q: 'What does <code>async/await</code> simplify?', options: ['DOM manipulation', 'Working with Promises', 'Memory management', 'CSS animations'], answer: 1 },
        { difficulty: 'intermediate', q: 'What is the <code>this</code> keyword in an arrow function?', options: ['Always window', 'Lexically bound from enclosing scope', 'Always undefined', 'The function itself'], answer: 1 },
        { difficulty: 'intermediate', q: 'Which method serializes an object to JSON?', options: ['JSON.parse()', 'JSON.stringify()', 'Object.toJSON()', 'serialize()'], answer: 1 },
        { difficulty: 'intermediate', q: 'What does <code>Object.keys()</code> return?', options: ['Values only', 'An array of property names', 'Key-value pairs', 'Prototype chain'], answer: 1 },
        { difficulty: 'intermediate', q: 'What is destructuring used for?', options: ['Deleting objects', 'Extracting values from arrays/objects', 'Freezing objects', 'Cloning prototypes'], answer: 1 },
        { difficulty: 'intermediate', q: 'What does <code>setTimeout(fn, 0)</code> do?', options: ['Runs immediately', 'Schedules fn after current call stack', 'Runs every 0ms forever', 'Throws an error'], answer: 1 },
        { difficulty: 'intermediate', q: 'Which loop iterates over object enumerable properties?', options: ['for...of', 'for...in', 'while only', 'do...while only'], answer: 1 },
        { difficulty: 'intermediate', q: 'What is a higher-order function?', options: ['A function with high complexity', 'A function that takes/returns functions', 'A built-in only', 'An async function'], answer: 1 },
        { difficulty: 'intermediate', q: 'What does <code>Array.reduce()</code> do?', options: ['Filters items', 'Accumulates to a single value', 'Sorts items', 'Reverses array'], answer: 1 },
        { difficulty: 'intermediate', q: 'What is the Temporal Dead Zone?', options: ['A browser bug', 'Period before let/const initialization', 'A memory leak', 'A deprecated API'], answer: 1 },
        { difficulty: 'advanced', q: 'What is the output of <code>([] + {})</code>?', options: ['"[object Object]"', '"[object Array]"', 'NaN', 'undefined'], answer: 0 },

        { difficulty: 'intermediate', q: 'What is a binary tree?', options: ['Tree with two roots', 'Tree where each node has at most two children', 'Sorted array', 'Graph with cycles'], answer: 1 },
        { difficulty: 'advanced', q: 'What is the traveling salesman problem class?', options: ['P problem', 'NP-hard optimization problem', 'O(1) problem', 'Sorting problem'], answer: 1 },
      ],
    };

    const LANG_LABELS = {
      javascript: 'JavaScript',
      python: 'Python',
      htmlcss: 'HTML/CSS',
      general: 'General CS',
    };

    const DIFF_LABELS = {
      beginner: 'Beginner',
      intermediate: 'Intermediate',
      advanced: 'Advanced',
    };

    const QUESTIONS_PER_QUIZ = 10;
    const TIME_PER_QUESTION = 20;
    const CIRCUMFERENCE = 2 * Math.PI * 22;

    // ─── State ───
    let selectedLang = null;
    let selectedDiff = null;
    let quizQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let timerInterval = null;
    let timeLeft = TIME_PER_QUESTION;
    let quizStartTime = 0;
    let answered = false;
    let audioCtx = null;

    // ─── DOM ───
    const screens = {
      home: document.getElementById('screen-home'),
      setup: document.getElementById('screen-setup'),
      quiz: document.getElementById('screen-quiz'),
      results: document.getElementById('screen-results'),
    };

    const els = {
      btnStart: document.getElementById('btn-start'),
      btnBegin: document.getElementById('btn-begin'),
      btnBackHome: document.getElementById('btn-back-home'),
      btnRetry: document.getElementById('btn-retry'),
      btnShare: document.getElementById('btn-share'),
      btnHome: document.getElementById('btn-home'),
      langOptions: document.getElementById('lang-options'),
      diffOptions: document.getElementById('diff-options'),
      quizMeta: document.getElementById('quiz-meta'),
      timerCircle: document.getElementById('timer-circle'),
      timerText: document.getElementById('timer-text'),
      progressLabel: document.getElementById('progress-label'),
      progressFill: document.getElementById('progress-fill'),
      questionCard: document.getElementById('question-card'),
      questionText: document.getElementById('question-text'),
      answers: document.getElementById('answers'),
      feedback: document.getElementById('feedback'),
      finalScore: document.getElementById('final-score'),
      perfMessage: document.getElementById('perf-message'),
      timeTaken: document.getElementById('time-taken'),
      toast: document.getElementById('toast'),
    };

    // ─── Audio (Web Audio API) ───
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playTone(freqs, durations, type = 'sine', volume = 0.15) {
      const ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
      let time = ctx.currentTime;
      freqs.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, time);
        gain.gain.setValueAtTime(volume, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + durations[i]);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(time);
        osc.stop(time + durations[i]);
        time += durations[i] * 0.85;
      });
    }

    function playCorrectSound() {
      playTone([523, 659, 784], [0.12, 0.12, 0.2]);
    }

    function playWrongSound() {
      playTone([300, 200], [0.15, 0.25], 'sawtooth', 0.1);
    }

    // ─── Navigation ───
    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.remove('active'));
      screens[name].classList.add('active');
    }

    // ─── Setup ───
    function setupOptionButtons(container, dataAttr, callback) {
      container.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          container.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          callback(btn.dataset[dataAttr]);
          els.btnBegin.disabled = !(selectedLang && selectedDiff);
        });
      });
    }

    setupOptionButtons(els.langOptions, 'lang', val => { selectedLang = val; });
    setupOptionButtons(els.diffOptions, 'diff', val => { selectedDiff = val; });

    // ─── Quiz Logic ───
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickQuestions(lang, diff) {
      const pool = QUESTION_BANK[lang].filter(q => q.difficulty === diff);
      const shuffled = shuffle(pool);
      if (shuffled.length >= QUESTIONS_PER_QUIZ) return shuffled.slice(0, QUESTIONS_PER_QUIZ);
      const extras = shuffle(QUESTION_BANK[lang].filter(q => q.difficulty !== diff));
      return [...shuffled, ...extras].slice(0, QUESTIONS_PER_QUIZ);
    }

    function startQuiz() {
      quizQuestions = pickQuestions(selectedLang, selectedDiff);
      currentIndex = 0;
      score = 0;
      quizStartTime = Date.now();
      els.quizMeta.textContent = `${LANG_LABELS[selectedLang]} · ${DIFF_LABELS[selectedDiff]}`;
      showScreen('quiz');
      renderQuestion(false);
    }

    function updateTimerVisual() {
      const pct = timeLeft / TIME_PER_QUESTION;
      const offset = CIRCUMFERENCE * (1 - pct);
      els.timerCircle.style.strokeDashoffset = offset;
      els.timerText.textContent = timeLeft;
      els.timerCircle.classList.remove('warning', 'danger');
      if (timeLeft <= 5) els.timerCircle.classList.add('danger');
      else if (timeLeft <= 10) els.timerCircle.classList.add('warning');
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function startTimer() {
      stopTimer();
      timeLeft = TIME_PER_QUESTION;
      updateTimerVisual();
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerVisual();
        if (timeLeft <= 0) {
          stopTimer();
          handleTimeout();
        }
      }, 1000);
    }

    function renderQuestion(animate) {
      answered = false;
      const q = quizQuestions[currentIndex];
      els.progressLabel.textContent = `${currentIndex + 1} / ${QUESTIONS_PER_QUIZ}`;
      els.progressFill.style.width = `${((currentIndex + 1) / QUESTIONS_PER_QUIZ) * 100}%`;
      els.feedback.style.display = 'none';
      els.questionText.innerHTML = q.q;

      els.answers.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.textContent = opt;
        btn.addEventListener('click', () => selectAnswer(i));
        els.answers.appendChild(btn);
      });

      if (animate) {
        els.questionCard.classList.remove('animating-out');
        els.questionCard.classList.add('animating-in');
        setTimeout(() => els.questionCard.classList.remove('animating-in'), 350);
      }

      startTimer();
    }

    function showFeedback(isCorrect, timedOut) {
      const q = quizQuestions[currentIndex];
      els.feedback.style.display = 'block';
      if (timedOut) {
        els.feedback.className = 'feedback timeout-fb';
        els.feedback.textContent = `Time's up! Correct answer: ${q.options[q.answer]}`;
      } else if (isCorrect) {
        els.feedback.className = 'feedback correct-fb';
        els.feedback.textContent = 'Correct! Nice work.';
      } else {
        els.feedback.className = 'feedback wrong-fb';
        els.feedback.textContent = `Wrong! Correct answer: ${q.options[q.answer]}`;
      }
    }

    function highlightAnswers(selectedIdx, timedOut) {
      const q = quizQuestions[currentIndex];
      const buttons = els.answers.querySelectorAll('.answer-btn');
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.answer) btn.classList.add('reveal-correct', 'correct');
        else if (i === selectedIdx && !timedOut) btn.classList.add('wrong');
      });
    }

    function selectAnswer(idx) {
      if (answered) return;
      answered = true;
      stopTimer();
      const q = quizQuestions[currentIndex];
      const isCorrect = idx === q.answer;
      if (isCorrect) {
        score++;
        playCorrectSound();
      } else {
        playWrongSound();
      }
      highlightAnswers(idx, false);
      showFeedback(isCorrect, false);
      setTimeout(nextQuestion, 1800);
    }

    function handleTimeout() {
      if (answered) return;
      answered = true;
      playWrongSound();
      highlightAnswers(-1, true);
      showFeedback(false, true);
      setTimeout(nextQuestion, 2000);
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= QUESTIONS_PER_QUIZ) {
        showResults();
        return;
      }
      els.questionCard.classList.add('animating-out');
      setTimeout(() => {
        renderQuestion(true);
        els.questionCard.classList.remove('animating-out');
      }, 250);
    }

    function formatTime(ms) {
      const totalSec = Math.floor(ms / 1000);
      const min = Math.floor(totalSec / 60);
      const sec = totalSec % 60;
      if (min > 0) return `${min}m ${sec}s`;
      return `${sec}s`;
    }

    function getPerfMessage(s) {
      if (s === 10) return 'Perfect score! You\'re a legend!';
      if (s >= 8) return 'Excellent! You really know your stuff.';
      if (s >= 6) return 'Good job! Keep practicing to level up.';
      if (s >= 4) return 'Not bad! Review the topics and try again.';
      return 'Keep learning — every expert was once a beginner.';
    }

    function showResults() {
      stopTimer();
      const elapsed = Date.now() - quizStartTime;
      els.finalScore.textContent = `${score}/${QUESTIONS_PER_QUIZ}`;
      els.perfMessage.textContent = getPerfMessage(score);
      els.timeTaken.textContent = `Time taken: ${formatTime(elapsed)}`;
      showScreen('results');
    }

    function getShareText() {
      return `I scored ${score}/${QUESTIONS_PER_QUIZ} on DevQuiz ${LANG_LABELS[selectedLang]} — ${DIFF_LABELS[selectedDiff]}! Can you beat me?`;
    }

    function showToast(msg) {
      els.toast.textContent = msg;
      els.toast.classList.add('show');
      setTimeout(() => els.toast.classList.remove('show'), 2500);
    }

    async function shareScore() {
      const text = getShareText();
      if (navigator.share) {
        try {
          await navigator.share({ text });
          return;
        } catch (e) {
          if (e.name === 'AbortError') return;
        }
      }
      try {
        await navigator.clipboard.writeText(text);
        showToast('Score copied to clipboard!');
      } catch {
        showToast(text);
      }
    }

    function resetSetup() {
      selectedLang = null;
      selectedDiff = null;
      els.langOptions.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      els.diffOptions.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      els.btnBegin.disabled = true;
    }

    // ─── Event Listeners ───
    els.btnStart.addEventListener('click', () => { resetSetup(); showScreen('setup'); });
    els.btnBackHome.addEventListener('click', () => showScreen('home'));
    els.btnBegin.addEventListener('click', startQuiz);
    els.btnRetry.addEventListener('click', startQuiz);
    els.btnShare.addEventListener('click', shareScore);
    els.btnHome.addEventListener('click', () => { resetSetup(); showScreen('home'); });

    els.timerCircle.style.strokeDasharray = CIRCUMFERENCE;
  </script>
</body>
